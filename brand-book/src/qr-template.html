<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>QR · MADCRY</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1000px;
        height: 1000px;
        font-family: "Oswald", sans-serif;
        background: #000;
        color: #fff;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      .stage {
        position: relative;
        width: 1000px;
        height: 1000px;
        padding: 50px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 50px;
        align-items: center;
        background:
          radial-gradient(circle at 0% 0%, rgba(220, 38, 38, 0.06), transparent 50%),
          #000;
      }

      /* Esquinas decorativas */
      .corner {
        position: absolute;
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.4em;
        color: #555;
      }
      .corner.tl { top: 24px; left: 50px; }
      .corner.tr { top: 24px; right: 50px; }
      .corner.bl { bottom: 24px; left: 50px; color: #777; letter-spacing: 0.3em; font-weight: 400; }
      .corner.br { bottom: 24px; right: 50px; color: #777; letter-spacing: 0.3em; font-weight: 400; }

      /* ─── COLUMNA IZQUIERDA: ficha tecnica ─── */
      .info {
        display: flex;
        flex-direction: column;
        gap: 22px;
        padding-left: 10px;
      }
      .name {
        font-size: 60px;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 0.92;
        color: #fff;
        text-transform: uppercase;
        max-width: 100%;
      }
      .divider {
        width: 56px;
        height: 3px;
        background: #dc2626;
        margin: 4px 0;
      }
      /* Bloque de ficha tipo etiqueta de galeria */
      .ficha {
        font-size: 24px;
        line-height: 1.55;
        color: #d6d6d6;
        font-weight: 300;
        letter-spacing: 0.02em;
      }
      .ficha .author {
        font-weight: 700;
        color: #fff;
        font-size: 30px;
        letter-spacing: 0.02em;
        margin-bottom: 8px;
        line-height: 1.1;
      }
      .ficha .author .year {
        color: #999;
        font-weight: 300;
        font-size: 24px;
      }
      .ficha .technique {
        font-style: italic;
        font-weight: 400;
      }
      .ficha .dimensions {
        font-weight: 700;
        color: #fff;
        letter-spacing: 0.05em;
        font-size: 26px;
        margin-top: 4px;
      }

      /* Scan hint debajo del QR (columna derecha) */
      .scan {
        margin-top: 22px;
        font-size: 11px;
        line-height: 1.8;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #777;
        text-align: center;
      }
      .scan strong {
        color: #fff;
        font-weight: 700;
        letter-spacing: 0.2em;
      }
      .scan .arrow {
        color: #dc2626;
      }

      /* ─── COLUMNA DERECHA: QR ─── */
      .qr-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .qr-card {
        position: relative;
        width: 420px;
        height: 420px;
        background: #fff;
        padding: 22px;
      }
      .qr-card::before,
      .qr-card::after {
        content: "";
        position: absolute;
        background: #dc2626;
      }
      .qr-card::before {
        top: -3px;
        left: -3px;
        width: 60px;
        height: 5px;
      }
      .qr-card::after {
        bottom: -3px;
        right: -3px;
        width: 60px;
        height: 5px;
      }
      .qr-card img.qr {
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: pixelated;
      }
      .logo-mask {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 80px;
        height: 80px;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 2px solid #fff;
        box-shadow: 0 0 0 2px #000;
      }
      .logo-mask img {
        width: 56px;
        height: 56px;
        object-fit: contain;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <span class="corner tl">MADCRY · STUDIO</span>
      <span class="corner tr">{{COLLECTION}}</span>

      <!-- ──── IZQUIERDA: ficha técnica ──── -->
      <div class="info">
        <h1 class="name">{{NAME}}</h1>
        <div class="divider"></div>

        <div class="ficha">
          <div class="author">{{AUTHOR}} <span class="year">· {{YEAR}}</span></div>
          <div class="technique">{{TECHNIQUE}}</div>
          <div class="dimensions">{{DIMENSIONS}}</div>
        </div>
      </div>

      <!-- ──── DERECHA: QR + scan hint debajo ──── -->
      <div class="qr-wrap">
        <div class="qr-card">
          <img class="qr" src="{{QR}}" alt="QR" />
          <div class="logo-mask">
            <img src="{{LOGO_DATA_URL}}" alt="MADCRY" />
          </div>
        </div>
        <div class="scan">
          <span class="arrow">↑</span> Escanea para adquirir<br />
          madcry.com/product/<strong>{{SLUG}}</strong>
        </div>
      </div>

      <span class="corner bl">{{DATE}}</span>
      <span class="corner br">madcry.com</span>
    </div>
  </body>
</html>
