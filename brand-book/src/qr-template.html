<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>QR · MADCRY</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 800px;
        height: 1200px;
        font-family: "Oswald", sans-serif;
        background: #000;
        color: #fff;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      .stage {
        position: relative;
        width: 800px;
        height: 1200px;
        padding: 50px 50px 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        background:
          radial-gradient(circle at 50% 0%, rgba(220, 38, 38, 0.06), transparent 60%),
          #000;
      }
      .corner {
        position: absolute;
        font-size: 11px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.4em;
        color: #555;
      }
      .corner.tl { top: 28px; left: 50px; }
      .corner.tr { top: 28px; right: 50px; }
      .corner.bl { bottom: 28px; left: 50px; color: #777; }
      .corner.br { bottom: 28px; right: 50px; color: #777; letter-spacing: 0.3em; font-weight: 400; }

      /* Cabecera con titulo de pieza */
      .eyebrow {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.5em;
        text-transform: uppercase;
        color: #dc2626;
        margin-top: 40px;
        margin-bottom: 10px;
        text-align: center;
      }
      .name {
        font-size: 38px;
        font-weight: 700;
        letter-spacing: -0.02em;
        line-height: 1;
        text-align: center;
        margin-bottom: 14px;
        max-width: 100%;
        color: #fff;
        text-transform: uppercase;
      }
      .author {
        font-size: 14px;
        font-weight: 400;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #bcbcbc;
        margin-bottom: 30px;
        text-align: center;
      }
      .author strong {
        color: #fff;
        font-weight: 700;
      }

      /* QR card */
      .qr-card {
        position: relative;
        width: 520px;
        height: 520px;
        background: #fff;
        padding: 28px;
        box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.06);
      }
      .qr-card::before,
      .qr-card::after {
        content: "";
        position: absolute;
        background: #dc2626;
      }
      .qr-card::before {
        top: -3px;
        left: -3px;
        width: 80px;
        height: 6px;
      }
      .qr-card::after {
        bottom: -3px;
        right: -3px;
        width: 80px;
        height: 6px;
      }
      .qr-card img.qr {
        width: 100%;
        height: 100%;
        display: block;
        image-rendering: pixelated;
      }

      /* Logo overlay center — fondo negro, letras blancas */
      .logo-mask {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100px;
        height: 100px;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 3px solid #fff;
        box-shadow: 0 0 0 3px #000;
      }
      .logo-mask img {
        width: 70px;
        height: 70px;
        object-fit: contain;
      }

      /* Bloque de metadatos (ficha tecnica de galeria) */
      .meta {
        margin-top: 32px;
        width: 520px;
        display: flex;
        flex-direction: column;
        gap: 8px;
        text-align: center;
      }
      .meta .row {
        display: flex;
        justify-content: center;
        gap: 12px;
        font-size: 13px;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: #bcbcbc;
        font-weight: 400;
      }
      .meta .row .sep {
        color: #444;
      }
      .meta .row strong {
        color: #fff;
        font-weight: 700;
      }
      .meta .status {
        margin-top: 6px;
        align-self: center;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        padding: 6px 18px;
        border: 1px solid;
      }
      .meta .status.available { color: #22c55e; border-color: rgba(34, 197, 94, 0.4); background: rgba(34, 197, 94, 0.08); }
      .meta .status.sold       { color: #ef4444; border-color: rgba(239, 68, 68, 0.4); background: rgba(239, 68, 68, 0.08); }
      .meta .status.reserved   { color: #f59e0b; border-color: rgba(245, 158, 11, 0.4); background: rgba(245, 158, 11, 0.08); }
      .meta .status.draft,
      .meta .status.unknown    { color: #999; border-color: rgba(255, 255, 255, 0.2); background: rgba(255, 255, 255, 0.04); }

      /* URL */
      .url {
        font-size: 12px;
        font-weight: 400;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        color: #888;
        margin-top: 22px;
        text-align: center;
      }
      .url strong {
        color: #fff;
        font-weight: 700;
      }
      .scan-hint {
        font-size: 9px;
        letter-spacing: 0.4em;
        text-transform: uppercase;
        color: #555;
        margin-top: 8px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <span class="corner tl">MADCRY · STUDIO</span>
      <span class="corner tr">{{COLLECTION}}</span>

      <div class="eyebrow">Pieza única · 1/1</div>
      <div class="name">{{NAME}}</div>
      <div class="author">
        <strong>{{AUTHOR}}</strong> · {{YEAR}}
      </div>

      <div class="qr-card">
        <img class="qr" src="{{QR}}" alt="QR" />
        <div class="logo-mask">
          <img src="{{LOGO_DATA_URL}}" alt="MADCRY" />
        </div>
      </div>

      <div class="meta">
        <div class="row">
          <span>{{TECHNIQUE}}</span>
        </div>
        <div class="row">
          <strong>{{DIMENSIONS}}</strong>
        </div>
        <div class="status {{STATUS_CLASS}}">{{STATUS}}</div>
      </div>

      <div class="url">
        madcry.com/product/<strong>{{SLUG}}</strong>
      </div>
      <div class="scan-hint">Escanea para adquirir</div>

      <span class="corner bl">{{DATE}}</span>
      <span class="corner br">madcry.com</span>
    </div>
  </body>
</html>
