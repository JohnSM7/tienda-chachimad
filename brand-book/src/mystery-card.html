<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>MADCRY · Mystery card</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@300;400;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        width: 1200px;
        height: 1200px;
        font-family: "Oswald", sans-serif;
        background: #000;
        color: #fff;
        overflow: hidden;
        -webkit-font-smoothing: antialiased;
      }
      .stage {
        position: relative;
        width: 1200px;
        height: 1200px;
        background:
          radial-gradient(circle at 50% 40%, rgba(220,38,38,0.08), transparent 60%),
          radial-gradient(circle at 80% 80%, rgba(255,255,255,0.04), transparent 50%),
          #000;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .grid-bg {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
        background-size: 80px 80px;
      }

      .watermark {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 920px;
        font-weight: 700;
        letter-spacing: -0.05em;
        line-height: 0.8;
        color: rgba(255,255,255,0.025);
        white-space: nowrap;
        user-select: none;
      }

      .border-frame {
        position: absolute;
        inset: 60px;
        border: 1px solid rgba(255,255,255,0.12);
      }
      .border-frame::before,
      .border-frame::after {
        content: '';
        position: absolute;
        background: rgba(220,38,38,0.9);
      }
      .border-frame::before {
        top: -1px; left: -1px;
        width: 80px; height: 4px;
      }
      .border-frame::after {
        bottom: -1px; right: -1px;
        width: 80px; height: 4px;
      }

      .content {
        position: relative;
        z-index: 2;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 50px;
      }

      .lock-icon {
        width: 110px;
        height: 110px;
        border: 3px solid #fff;
        border-radius: 6px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .lock-icon::before {
        content: '';
        position: absolute;
        top: -54px;
        width: 64px;
        height: 64px;
        border: 3px solid #fff;
        border-bottom: none;
        border-radius: 50% 50% 0 0;
      }
      .lock-icon::after {
        content: '';
        width: 14px;
        height: 24px;
        background: #fff;
        border-radius: 4px;
      }

      .eyebrow {
        font-size: 16px;
        text-transform: uppercase;
        letter-spacing: 0.6em;
        color: #999;
        font-weight: 700;
      }

      .title {
        font-size: 240px;
        font-weight: 700;
        letter-spacing: -0.04em;
        line-height: 0.85;
        color: #fff;
      }

      .subtitle {
        font-size: 36px;
        font-weight: 300;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: #d6d6d6;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 14px;
        font-size: 18px;
        text-transform: uppercase;
        letter-spacing: 0.4em;
        color: #fff;
        border: 1.5px solid rgba(255,255,255,0.35);
        padding: 16px 32px;
        margin-top: 8px;
      }
      .pill .dot {
        width: 12px;
        height: 12px;
        background: #dc2626;
        border-radius: 50%;
        box-shadow: 0 0 14px rgba(220,38,38,0.85);
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }

      .corner-tag {
        position: absolute;
        z-index: 3;
        font-size: 13px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.4em;
        color: #666;
      }
      .corner-tag.tl { top: 96px; left: 96px; }
      .corner-tag.br { bottom: 96px; right: 96px; }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="watermark">M</div>
      <div class="grid-bg"></div>
      <div class="border-frame"></div>

      <div class="corner-tag tl">MADCRY · Studio</div>
      <div class="corner-tag br">SOON · 13.05.26</div>

      <div class="content">
        <div class="lock-icon"></div>
        <div class="eyebrow">Pieza protegida</div>
        <div class="title">SOON</div>
        <div class="subtitle">Reveal · 13.05.2026</div>
        <div class="pill"><span class="dot"></span> Coming Soon</div>
      </div>
    </div>
  </body>
</html>
